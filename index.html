<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FX Evidence</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #161a24;
      --card2: #1e2330;
      --border: #2a2f3d;
      --text: #e8eaf0;
      --muted: #6b7280;
      --green: #22c55e;
      --green-dim: #16a34a22;
      --red: #ef4444;
      --red-dim: #dc262622;
      --blue: #3b82f6;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* в”Җв”Җ Header в”Җв”Җ */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .header-sub { font-size: 12px; color: var(--muted); }

    /* в”Җв”Җ Main в”Җв”Җ */
    main { max-width: 900px; margin: 0 auto; padding: 28px 16px 80px; }

    /* в”Җв”Җ All-time stats в”Җв”Җ */
    .stats-section { margin-bottom: 28px; }
    .stats-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid .stat-pnl { grid-column: 1 / -1; }
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card .unit {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 3px;
    }
    .stat-pnl { background: var(--card2); }
    .stat-pnl .value { font-size: 30px; }
    .val-green { color: var(--green); }
    .val-red { color: var(--red); }
    .val-white { color: var(--text); }

    /* в”Җв”Җ Tabs в”Җв”Җ */
    .tabs-bar {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      width: fit-content;
    }
    .tab-btn {
      padding: 7px 20px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* в”Җв”Җ Period list в”Җв”Җ */
    .period-list { display: flex; flex-direction: column; gap: 8px; }

    .period-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .period-row:hover { border-color: var(--accent); }
    .period-row.open { border-color: var(--accent); }

    .period-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .period-date {
      font-size: 15px;
      font-weight: 600;
    }
    .period-mini-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .mini-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    .mini-stat strong { font-size: 14px; color: var(--text); }
    .mini-stat .g { color: var(--green); }
    .mini-stat .r { color: var(--red); }

    .period-pnl {
      font-size: 18px;
      font-weight: 700;
      min-width: 100px;
      text-align: right;
    }

    /* в”Җв”Җ Detail (screenshot + day breakdown) в”Җв”Җ */
    .period-detail { display: none; margin-top: 16px; }
    .period-row.open .period-detail { display: block; }

    .detail-screenshot {
      width: 100%;
      max-height: 500px;
      object-fit: contain;
      border-radius: 8px;
      background: #000;
    }
    .detail-no-img {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    /* days inside week/month/year */
    .sub-days { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .sub-day {
      background: var(--card2);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      cursor: pointer;
    }
    .sub-day:hover { background: #23283a; }
    .sub-day-date { font-size: 13px; color: var(--text); font-weight: 500; }
    .sub-day-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); }
    .sub-day-pnl { font-size: 14px; font-weight: 600; }

    /* в”Җв”Җ Loading / empty в”Җв”Җ */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 15px;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* в”Җв”Җ Image modal в”Җв”Җ */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #modal.open { display: flex; }
    #modal img {
      max-width: 95vw;
      max-height: 95vh;
      border-radius: 8px;
      object-fit: contain;
    }
    #modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    FX Evidence
  </div>
  <div class="header-sub">з¬¬дёүиҖ…зўәиӘҚгғ»е…¬й–ӢиЁҳйҢІ</div>
</header>

<main>
  <!-- All-time stats -->
  <div class="stats-section">
    <div class="stats-label">зҙҜиЁҲгғ‘гғ•гӮ©гғјгғһгғігӮ№</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">жұәжёҲеӣһж•°</div>
        <div class="value" id="t-settlements">вҖ”<span class="unit">еӣһ</span></div>
      </div>
      <div class="stat-card">
        <div class="label">еӢқгҒЎж•°</div>
        <div class="value val-green" id="t-wins">вҖ”<span class="unit">еӣһ</span></div>
      </div>
      <div class="stat-card">
        <div class="label">иІ гҒ‘ж•°</div>
        <div class="value val-red" id="t-losses">вҖ”<span class="unit">еӣһ</span></div>
      </div>
      <div class="stat-card">
        <div class="label">еӢқзҺҮ</div>
        <div class="value" id="t-winrate">вҖ”<span class="unit">%</span></div>
      </div>
      <div class="stat-card stat-pnl">
        <div class="label">зҙҜиЁҲжҗҚзӣҠ</div>
        <div class="value" id="t-pnl">вҖ”</div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="daily">ж—ҘеҲҘ</button>
    <button class="tab-btn" data-tab="weekly">йҖұеҲҘ</button>
    <button class="tab-btn" data-tab="monthly">жңҲеҲҘ</button>
    <button class="tab-btn" data-tab="yearly">е№ҙеҲҘ</button>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="loading">
      <div class="spinner"></div><br>иӘӯгҒҝиҫјгҒҝдёӯ...
    </div>
  </div>
</main>

<!-- Image modal -->
<div id="modal">
  <button id="modal-close" onclick="closeModal()">вң• й–үгҒҳгӮӢ</button>
  <img id="modal-img" src="" alt="">
</div>

<script>
const SUPABASE_URL  = 'https://yeragkyletzjbyvztfxu.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_BHDVWDMPgdBMVKMx7XlifA_vjzYmsMe';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allRecords = [];
let currentTab = 'daily';

// в”Җв”Җ Init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function init() {
  const { data, error } = await sb
    .from('daily_records')
    .select('*')
    .order('trade_date', { ascending: false });

  if (error) {
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="empty-icon">вҡ пёҸ</div><div class="empty-text">гғҮгғјгӮҝгҒ®иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ</div></div>`;
    return;
  }

  allRecords = data || [];
  renderTotalStats();
  renderTab('daily');
}

// в”Җв”Җ Total stats в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTotalStats() {
  const tot = aggregate(allRecords);
  const wr = tot.settlements > 0
    ? (tot.wins / tot.settlements * 100).toFixed(1)
    : 0;

  setText('t-settlements', fmt(tot.settlements, 'еӣһ'));
  setText('t-wins', fmt(tot.wins, 'еӣһ'));
  setText('t-losses', fmt(tot.losses, 'еӣһ'));
  setText('t-winrate', wr + '<span class="unit">%</span>');

  const sign = tot.pnl >= 0 ? '+' : '';
  const pnlEl = document.getElementById('t-pnl');
  pnlEl.innerHTML = `${sign}ВҘ${Math.abs(tot.pnl).toLocaleString('ja-JP', {maximumFractionDigits:2})}`;
  pnlEl.className = 'value ' + (tot.pnl >= 0 ? 'val-green' : 'val-red');
}

function setText(id, html) {
  document.getElementById(id).innerHTML = html;
}
function fmt(n, unit) {
  return `${n}<span class="unit">${unit}</span>`;
}

// в”Җв”Җ Aggregate helper в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function aggregate(records) {
  return records.reduce((acc, r) => ({
    settlements: acc.settlements + (r.settlements || 0),
    wins:        acc.wins        + (r.wins        || 0),
    losses:      acc.losses      + (r.losses      || 0),
    pnl:         acc.pnl        + (r.pnl         || 0),
  }), { settlements: 0, wins: 0, losses: 0, pnl: 0 });
}

// в”Җв”Җ Tabs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderTab(currentTab);
  });
});

function renderTab(tab) {
  const content = document.getElementById('content');

  if (allRecords.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">рҹ“ӯ</div>
        <div class="empty-text">гҒҫгҒ гғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ<br>TelegramгҒӢгӮүгӮ№гӮҜгғӘгғјгғігӮ·гғ§гғғгғҲгӮ’йҖҒгҒЈгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>
      </div>`;
    return;
  }

  if (tab === 'daily')   renderDaily(content);
  if (tab === 'weekly')  renderWeekly(content);
  if (tab === 'monthly') renderMonthly(content);
  if (tab === 'yearly')  renderYearly(content);
}

// в”Җв”Җ Daily в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderDaily(container) {
  const rows = allRecords.map(r => {
    const d = parseDate(r.trade_date);
    const label = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} (${dayName(d)})`;
    return periodRow(r.trade_date, label, [r], true);
  });
  container.innerHTML = `<div class="period-list">${rows.join('')}</div>`;
  bindRows();
}

// в”Җв”Җ Weekly в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderWeekly(container) {
  const weeks = groupBy(allRecords, r => weekKey(r.trade_date));
  const sorted = Object.entries(weeks).sort((a,b) => b[0].localeCompare(a[0]));
  const rows = sorted.map(([key, records]) => {
    const { start, end } = weekRange(key);
    const label = `${fmtDate(start)} гҖң ${fmtDate(end)}`;
    return periodRow(key, label, records, false);
  });
  container.innerHTML = `<div class="period-list">${rows.join('')}</div>`;
  bindRows();
}

// в”Җв”Җ Monthly в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderMonthly(container) {
  const months = groupBy(allRecords, r => r.trade_date.substring(0, 7));
  const sorted = Object.entries(months).sort((a,b) => b[0].localeCompare(a[0]));
  const rows = sorted.map(([key, records]) => {
    const [y, m] = key.split('-');
    const label = `${y}тәt${parseInt(m)}жңҲ`;
    return periodRow(key, label, records, false);
  });
  container.innerHTML = `<div class="period-list">${rows.join('')}</div>`;
  bindRows();
}

// в”Җв”Җ Yearly в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderYearly(container) {
  const years = groupBy(allRecords, r => r.trade_date.substring(0, 4));
  const sorted = Object.entries(years).sort((a,b) => b[0].localeCompare(a[0]));
  const rows = sorted.map(([key, records]) => {
    const label = `${key}е№ҙ`;
    return periodRow(key, label, records, false);
  });
  container.innerHTML = `<div class="period-list">${rows.join('')}</div>`;
  bindRows();
}

// в”Җв”Җ Period row builder в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function periodRow(key, label, records, isDay) {
  const agg = aggregate(records);
  const wr = agg.settlements > 0
    ? (agg.wins / agg.settlements * 100).toFixed(1)
    : 0;
  const sign = agg.pnl >= 0 ? '+' : '';
  const pnlStr = `${sign}ВҘ${Math.abs(agg.pnl).toLocaleString('ja-JP', {maximumFractionDigits:2})}`;
  const pnlClass = agg.pnl >= 0 ? 'val-green' : 'val-red';

  let detail = '';
  if (isDay) {
    const r = records[0];
    if (r.screenshot_url) {
      detail = `<img class="detail-screenshot" src="${r.screenshot_url}" alt="еҸ–еј•иЁјжӢ " onclick="openModal('${r.screenshot_url}')" loading="lazy">`;
    } else {
      detail = `<div class="detail-no-img">рҹ“ё гӮ№гӮҜгғӘгғјгғігӮ·гғ§гғғгғҲгҒӘгҒ—</div>`;
    }
  } else {
    // Show sub-days
    const subDays = records
      .sort((a,b) => b.trade_date.localeCompare(a.trade_date))
      .map(r => {
        const d = parseDate(r.trade_date);
        const dl = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} (${dayName(d)})`;
        const sp = r.pnl >= 0 ? '+' : '';
        const sc = r.pnl >= 0 ? 'val-green' : 'val-red';
        const imgClick = r.screenshot_url
          ? `onclick="openModal('${r.screenshot_url}')"` : '';
        return `
          <div class="sub-day" ${imgClick}>
            <div class="sub-day-date">${dl}</div>
            <div class="sub-day-stats">
              <span>жұәжёҲ ${r.settlements}еӣһ</span>
              <span class="g">еӢқ${r.wins}</span>
              <span class="r">иІ ${r.losses}</span>
              <span>еӢқзҺҮ ${r.settlements>0?(r.wins/r.settlements*100).toFixed(1):0}%</span>
            </div>
            <div class="sub-day-pnl ${sc}">${sp}ВҘ${Math.abs(r.pnl).toLocaleString('ja-JP',{maximumFractionDigits:2})}</div>
          </div>`;
      }).join('');
    detail = `<div class="sub-days">${subDays}</div>`;
  }

  return `
    <div class="period-row" data-key="${key}">
      <div class="period-head">
        <div class="period-date">${label}</div>
        <div class="period-mini-stats">
          <div class="mini-stat">жұәжёҲ <strong>${agg.settlements}еӣһ</strong></div>
          <div class="mini-stat"><span class="g">еӢқ${agg.wins}</span></div>
          <div class="mini-stat"><span class="r">иІ ${agg.losses}</span></div>
          <div class="mini-stat">еӢқзҺҮ <strong>${wr}%</strong></div>
        </div>
        <div class="period-pnl ${pnlClass}">${pnlStr}</div>
      </div>
      <div class="period-detail">${detail}</div>
    </div>`;
}

function bindRows() {
  document.querySelectorAll('.period-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.tagName === 'IMG') return;
      row.classList.toggle('open');
    });
  });
}

// в”Җв”Җ Utils в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function groupBy(arr, keyFn) {
  return arr.reduce((acc, item) => {
    const k = keyFn(item);
    (acc[k] = acc[k] || []).push(item);
    return acc;
  }, {});
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function pad(n) { return String(n).padStart(2, '0'); }

const DAYS = ['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
function dayName(d) { return DAYS[d.getDay()]; }

function fmtDate(d) {
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
}

// Week key: ISO week (Monday-based)
function weekKey(dateStr) {
  const d = parseDate(dateStr);
  const day = d.getDay(); // 0=Sun
  const diff = (day === 0 ? -6 : 1) - day; // shift to Monday
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon.toISOString().substring(0, 10);
}

function weekRange(monStr) {
  const start = parseDate(monStr);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return { start, end };
}

// в”Җв”Җ Modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openModal(url) {
  document.getElementById('modal-img').src = url;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-img').src = '';
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
